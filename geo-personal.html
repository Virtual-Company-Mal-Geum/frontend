<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEO — 마이 대시보드</title>
<link rel="stylesheet" href="geo-styles.css">
</head>
<body class="page-personal">

<aside class="sidebar">
  <a href="index.html" class="sidebar-logo">GE<span>O</span></a>
  <div class="sidebar-section">menu</div>
  <nav class="sidebar-nav">
    <a class="nav-item active" href="geo-personal.html"><span class="icon">📊</span> 대시보드</a>
    <a class="nav-item" href="#"><span class="icon">📁</span> 내 의뢰<span class="nav-badge">8</span></a>
    <div class="sidebar-section" style="padding-left:0;margin-top:12px">설정</div>
    <a class="nav-item" href="#"><span class="icon">⚙️</span> 계정 설정</a>
    <a class="nav-item" href="#"><span class="icon">💳</span> 플랜 관리</a>
    <a class="nav-item" href="#"><span class="icon">🔔</span> 알림</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="user-avatar">기</div>
      <div><div class="user-name">기캡이</div><div class="user-plan"></div></div>
      <button class="logout-btn" onclick="window.location.href='index.html'">로그아웃</button>
    </div>
  </div>
</aside>

<div class="main-content">
  <div class="topbar">
    <div class="topbar-left">
      <h1>내 대시보드</h1>
      <p>안녕하세요, 기캡이님. 오늘도 좋은 최적화 되세요.</p>
    </div>
    <a href="geo-order.html" class="btn-new"><span>+</span> 새 의뢰</a>
  </div>

  <div class="content">

    <div class="stats-row">
      <div class="stat-card c-blue"><div class="sc-icon">📁</div><div class="sc-val" id="stat-total">—</div><div class="sc-label">전체 의뢰</div></div>
      <div class="stat-card c-green"><div class="sc-icon">✅</div><div class="sc-val" id="stat-done">—</div><div class="sc-label">완료된 분석</div></div>
      <div class="stat-card c-orange"><div class="sc-icon">⏳</div><div class="sc-val" id="stat-progress">—</div><div class="sc-label">분석 진행 중</div></div>
      <div class="stat-card c-purple"><div class="sc-icon">🗓️</div><div class="sc-val" id="stat-month">—</div><div class="sc-label">이번 달 의뢰</div></div>
    </div>

    <div class="list-controls">
      <div class="search-box">
        <span style="color:var(--gray-400)">🔍</span>
        <input type="text" placeholder="의뢰 검색..." oninput="filterProjects(this.value)">
      </div>
      <button class="filter-btn active" onclick="setFilter(this,'all')">전체</button>
      <button class="filter-btn" onclick="setFilter(this,'done')">완료</button>
      <button class="filter-btn" onclick="setFilter(this,'progress')">진행 중</button>
      <button class="filter-btn" onclick="setFilter(this,'queued')">대기</button>
    </div>

    <div class="project-list" id="projectList">
      <!-- DB에서 동적으로 로드됩니다 -->
      <div id="list-loading" style="text-align:center;padding:48px;color:var(--gray-400);">
        ◌ 의뢰 목록 불러오는 중...
      </div>
    </div>

    <div class="pagination">
      <div class="page-info" id="pageInfo">—</div>
      <div class="page-btns">
        <button class="page-btn">‹</button>
        <button class="page-btn active">1</button>
        <button class="page-btn">2</button>
        <button class="page-btn">›</button>
      </div>
    </div>

  </div>
</div>

<script src="geo-scripts.js"></script>
</body>
</html>
