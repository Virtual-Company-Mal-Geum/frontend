<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GEOproject — 접수 완료</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
</head>
<body>
<div class="bg-gradient" id="bgGradient"></div>

  <header class="site-header">
    <div class="logo" onclick="location.href='main.html'" style="cursor:pointer">
      <span class="logo-mark">logo</span>
      <span class="logo-text">TEST</span>
    </div>
    <nav class="site-nav">
  <button class="btn-nav" onclick="location.href='index.html'">HOME</button>
</nav>
  </header>

  <section class="thanks-section">
    <div class="thanks-icon">✓</div>
    <h1 class="thanks-title">감사합니다!</h1>
    <p class="thanks-desc">
      GEO 솔루션 처리가 완료되면<br />
      작성하신 연락처로 안내해드리겠습니다.
    </p>
    <button class="thanks-btn" onclick="location.href='main.html'">
      처음으로 돌아가기
    </button>
  </section>

  <style>
    .thanks-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 60px);
      text-align: center;
      padding: 48px;
      animation: fade-up 0.6s ease both;
    }
    .thanks-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: var(--accent);
      margin-bottom: 32px;
      animation: fade-up 0.5s ease both;
    }
    .thanks-title {
      font-family: var(--font-head);
      font-size: clamp(36px, 5vw, 60px);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
      animation: fade-up 0.5s 0.1s ease both;
    }
    .thanks-desc {
      font-size: 16px;
      font-weight: 300;
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 48px;
      animation: fade-up 0.5s 0.2s ease both;
    }
    .thanks-btn {
      background: transparent;
      border: 1px solid var(--border-hover);
      border-radius: var(--radius-lg);
      padding: 12px 32px;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      animation: fade-up 0.5s 0.3s ease both;
    }
    .thanks-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
<script>
  const bg = document.getElementById('bgGradient');
  document.addEventListener('mousemove', e => {
    const x = (e.clientX / window.innerWidth  * 100).toFixed(1);
    const y = (e.clientY / window.innerHeight * 100).toFixed(1);
    bg.style.background = `
      radial-gradient(
        600px circle at ${x}% ${y}%,
        rgba(255,255,255,0.04) 0%,
        transparent 70%
      )
    `;
  });
</script>
</body>
</html>
