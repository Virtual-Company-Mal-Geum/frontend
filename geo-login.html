<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEO — 로그인 | Generative Engine Optimization</title>

<link rel="stylesheet" href="geo-styles.css">
</head>
<body class="page-login">

<!-- LEFT PANEL -->
<div class="left-panel">
  <div class="lp-orb lp-orb-1"></div>
  <div class="lp-orb lp-orb-2"></div>
  <a href="geo-index.html" class="lp-logo">GE<span>O</span></a>
  <div class="lp-center">
    <div class="lp-title">AI가 찾아오는<br><em>사이트</em>를 만드세요</div>
    <p class="lp-sub">JSON-LD 스키마 분석부터 AI 인용률 추적까지,<br>
      GEO 대시보드에서 모든 최적화 현황을 확인하세요.</p>
    <div class="mini-map">
      <canvas id="miniCanvas"></canvas>
    </div>
  </div>
</div>

<!-- RIGHT PANEL -->
<div class="right-panel">
  <div class="form-header">
    <span class="form-eyebrow">Login</span>
    <div class="form-title">환영합니다</div>
    <div class="form-sub">계정 정보를 입력해 주세요.</div>
  </div>

  <div class="error-msg" id="errMsg">이메일 또는 비밀번호가 올바르지 않습니다.</div>

  <form id="loginForm">
    <div class="field">
      <label for="email">이메일</label>
      <div class="input-wrap">
        <span class="input-icon">✉</span>
        <input type="email" id="email" placeholder="name@company.com" required>
      </div>
    </div>
    <div class="field">
      <label for="password">비밀번호</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
    </div>
    <div class="field-row">
      <div class="checkbox-wrap">
        <input type="checkbox" id="remember">
        <label for="remember">로그인 유지</label>
      </div>
      <a href="#" class="forgot">비밀번호 찾기</a>
    </div>
    <button class="btn btn-submit" type="submit">로그인하기 →</button>
  </form>

  <div class="divider"><hr><span>또는</span><hr></div>

  <button class="btn-google">
    <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 6.294C4.672 4.167 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
    Google로 계속하기
  </button>

  <div class="signup-link">계정이 없으신가요? <a href="geo-signup.html">회원가입</a></div>
</div>

<script src="geo-scripts.js"></script>
</body>
</html>
