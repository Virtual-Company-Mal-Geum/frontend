<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GEOproject</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
</head>
<body>
<div class="bg-gradient" id="bgGradient"></div>

  <header class="site-header">
    <div class="logo">
      <span class="logo-mark">logo</span>
      <span class="logo-text">TEST</span>
    </div>
  </header>

  <section class="index-section">
    <h1 class="index-title">project name</h1>
    <p class="index-sub">
      새로운 분석을 시작하거나<br />
      기존 결과를 조회할 수 있습니다.
    </p>

    <div class="index-cards">

      <div class="index-card" onclick="location.href='main.html'">
        <div class="index-card-icon">＋</div>
        <div class="index-card-body">
          <span class="index-card-title">새 분석 시작</span>
          <span class="index-card-desc">URL을 입력하고 GEO 경쟁력 분석을 요청합니다</span>
        </div>
        <span class="index-card-arrow">→</span>
      </div>

      <div class="index-card" onclick="location.href='lookup.html'">
        <div class="index-card-icon">⌕</div>
        <div class="index-card-body">
          <span class="index-card-title">결과 조회</span>
          <span class="index-card-desc">이메일 또는 전화번호로 결과를 확인합니다</span>
        </div>
        <span class="index-card-arrow">→</span>
      </div>

    </div>
  </section>

  <footer class="site-footer">
  </footer>

  <style>
    .index-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 120px);
      text-align: center;
      padding: 48px;
    }

    .index-tag {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 32px;
      animation: fade-up 0.5s ease both;
    }

    .index-title {
      font-family: var(--font-head);
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.05;
      margin-bottom: 20px;
      animation: fade-up 0.5s 0.05s ease both;
    }

    .index-sub {
      font-size: 16px;
      font-weight: 300;
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 56px;
      animation: fade-up 0.5s 0.1s ease both;
    }

    .index-cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 560px;
      animation: fade-up 0.5s 0.15s ease both;
    }

    .index-card {
      display: flex;
      align-items: center;
      gap: 20px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px 32px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
    }
    .index-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    .index-card:hover .index-card-arrow {
      transform: translateX(4px);
    }

    .index-card-icon {
      font-size: 24px;
      color: var(--accent);
      width: 48px;
      height: 48px;
      border: 1px solid var(--border-hover);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .index-card-body {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .index-card-title {
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .index-card-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .index-card-arrow {
      font-size: 20px;
      color: var(--text-muted);
      transition: transform 0.25s, color 0.25s;
      flex-shrink: 0;
    }
    .index-card:hover .index-card-arrow {
      color: var(--accent);
    }
  </style>
<script>
  const bg = document.getElementById('bgGradient');
  document.addEventListener('mousemove', e => {
    const x = (e.clientX / window.innerWidth  * 100).toFixed(1);
    const y = (e.clientY / window.innerHeight * 100).toFixed(1);
    bg.style.background = `
      radial-gradient(
        600px circle at ${x}% ${y}%,
        rgba(255,255,255,0.04) 0%,
        transparent 70%
      )
    `;
  });
</script>
</body>
</html>
